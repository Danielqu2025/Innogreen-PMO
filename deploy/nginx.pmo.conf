# nginx 配置示例（备用，当前未启用）
# 用途：如果将来要把静态前端托管从 FastAPI 迁到 nginx，用这块配置。
# 当前 FastAPI 已经托管 /assets 和 SPA fallback，无需 nginx。
#
# 部署：
#   sudo cp deploy/nginx.pmo.conf /etc/nginx/sites-available/pmo.dqhermes.kdns.fr.conf
#   sudo ln -s /etc/nginx/sites-available/pmo.dqhermes.kdns.fr.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# 然后把 cloudflared/config.yml 里 pmo.dqhermes.kdns.fr → http://127.0.0.1:8789
# （nginx listen 在 8789），同时 innogreen-pmo-app.service 改 --port 8001（仅 /api 用）

server {
    listen 8789;
    server_name pmo.dqhermes.kdns.fr;

    # 前端 SPA 产物（build 后在此）
    root /home/ubuntu/Innogreen-PMO/web/frontend/dist;
    index index.html;

    # SPA 路由 fallback：所有非 /api 非静态资源的请求都回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源（带 hash 的 long-cache 友好）
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 反代到 FastAPI 后端
    location /api/ {
        proxy_pass http://127.0.0.1:8001;  # 注意末尾不带 /
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8001/health;
    }
}

# 关键安全约束（同 web/README.md）：
#   - nginx 仅绑 127.0.0.1，绝不 0.0.0.0（由 Cloudflare Tunnel 反代）
#   - PMO_TRUST_PROXY_HEADER=true 时，审计 IP 与限速 IP 才走 X-Forwarded-For，
#     否则直接用 request.client.host（避免被客户端伪造 XFF 绕过限速）